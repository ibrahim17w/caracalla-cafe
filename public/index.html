<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caracalla Cafe</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .splash {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: linear-gradient(160deg, var(--cream) 0%, #FFF8F0 50%, var(--cream) 100%);
    }
    [data-theme="dark"] .splash {
      background: linear-gradient(160deg, #1a1612 0%, #2a2420 50%, #1a1612 100%);
    }
    .splash-logo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--primary);
      box-shadow: var(--shadow-lg);
      margin-bottom: 1.5rem;
    }
    .splash-logo-placeholder {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    .splash h1 {
      font-size: 2.5rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }
    .splash .tagline {
      color: var(--text-muted);
      font-size: 1.1rem;
      margin-bottom: 2rem;
      max-width: 400px;
    }
    .splash-actions {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      width: 100%;
      max-width: 320px;
    }
    .splash-actions .btn {
      font-size: 1.1rem;
      padding: 1rem;
      font-weight: 700;
    }
    .splash-contact {
      margin-top: 2rem;
      color: var(--text);
      font-size: 1rem;
      line-height: 2.2;
      background: var(--white);
      padding: 1.5rem 2rem;
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow);
      max-width: 400px;
      width: 100%;
    }
    .splash-contact a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }
    .splash-contact a:hover {
      text-decoration: underline;
    }
    .splash-contact .contact-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 1.05rem;
    }
    .splash-links {
      margin-top: 1.5rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .splash-links a {
      color: var(--text-muted);
      font-size: 0.9rem;
      text-decoration: none;
      padding: 0.4rem 0.8rem;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
    }
    .splash-links a:hover {
      color: var(--primary);
      background: var(--white);
    }
    .pulse {
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    .loading-dots {
      display: inline-block;
      animation: blink 1.4s infinite both;
    }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }
        .open-status-splash {
      margin-top: 1rem;
      padding: 0.5rem 1.5rem;
      border-radius: 20px;
      font-size: 1rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .open-status-splash.open {
      background: #E8F5E9;
      color: #5A8F5A;
    }
    .open-status-splash.closed {
      background: #FFEBEE;
      color: #B85450;
    }
    .splash-hours {
      margin-top: 0.8rem;
      padding: 0.6rem 1.2rem;
      background: var(--white);
      border-radius: 12px;
      font-size: 0.95rem;
      color: var(--text-muted);
      box-shadow: var(--shadow);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .splash-hours::before {
      content: '🕐';
    }
    [data-theme="dark"] .splash-hours {
      background: var(--white);
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="splash">
    <div id="splashLogo" class="splash-logo-placeholder">☕</div>
    <h1 id="splashName">Caracalla Cafe</h1>
    <p class="tagline" id="splashTagline">قهوتك المفضلة، بنقرة واحدة</p>

    <div class="splash-actions">
      <a href="/menu" class="btn btn-primary btn-block pulse">📋 تصفح القائمة</a>
      <a href="menu.html#track" class="btn btn-outline btn-block">📋 تتبع طلبي</a>
      <button class="btn btn-outline btn-block" onclick="showLocation()">📍 موقع المقهى</button>
    </div>

    <div class="splash-contact" id="splashContact">
      <span class="loading-dots">جاري التحميل...</span>
    </div>
    <div class="open-status-splash" id="splashOpenStatus" style="display:none;"></div>
    <div class="splash-hours" id="splashHours" style="display:none;"></div>
  </div>

  <!-- Location Modal -->
  <div class="modal-overlay hidden" id="locationModal">
    <div class="modal" style="max-width:500px;">
      <h2>📍 موقع المقهى</h2>
      <div class="map-container" id="splashMap" style="height:300px;"></div>
      <div id="splashDistance" style="margin-top:0.5rem;font-weight:700;color:var(--primary);text-align:center;"></div>
      <div class="flex gap-1 mt-1 align-center">
        <button class="btn btn-outline btn-sm" onclick="getSplashCurrentLocation()">📍 موقعي الحالي</button>
        <button class="btn btn-primary" onclick="closeLocation()" style="margin-right:auto;">إغلاق</button>
      </div>
    </div>
  </div>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="notifications.js"></script>
  <script>
    const API = window.location.origin + '/api';
    let splashMap = null;
    let cafeLocation = null;

    let splashSettings = {};

    async function loadSplashData() {
      try {
        const res = await fetch(`${API}/settings`);
        if (!res.ok) throw new Error('Failed');
        const settings = await res.json();
        splashSettings = settings;

        if (settings.cafe_name) {
          document.getElementById('splashName').textContent = settings.cafe_name;
          document.title = settings.cafe_name;
        }
        if (settings.cafe_logo) {
          const logo = document.createElement('img');
          logo.src = settings.cafe_logo;
          logo.className = 'splash-logo';
          logo.alt = settings.cafe_name || 'الشعار';
          const placeholder = document.getElementById('splashLogo');
          placeholder.parentNode.replaceChild(logo, placeholder);
        }

        if (settings.cafe_lat && settings.cafe_lng) {
          cafeLocation = { lat: parseFloat(settings.cafe_lat), lng: parseFloat(settings.cafe_lng) };
        }
        
        // Open/close status
        const openStatusEl = document.getElementById('splashOpenStatus');
        if (openStatusEl && (settings.cafe_open_hours || settings.cafe_force_open)) {
          const now = new Date();
          const syriaTime = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Damascus' }));
          const currentHour = syriaTime.getHours();
          const currentMinute = syriaTime.getMinutes();
          const currentTime = currentHour * 60 + currentMinute;
          
          let isOpen = false;
          if (splashSettings.cafe_force_open === 'true') {
            isOpen = true;
          } else if (settings.cafe_open_hours) {
            try {
              const hours = typeof settings.cafe_open_hours === 'string' ? JSON.parse(settings.cafe_open_hours) : settings.cafe_open_hours;
              const [openH, openM] = (hours.open || '08:00').split(':').map(Number);
              const [closeH, closeM] = (hours.close || '23:00').split(':').map(Number);
              const openTime = openH * 60 + openM;
              const closeTime = closeH * 60 + closeM;
              isOpen = currentTime >= openTime && currentTime < closeTime;
            } catch (e) {}
          }
          
          openStatusEl.style.display = 'inline-flex';
          openStatusEl.className = 'open-status-splash ' + (isOpen ? 'open' : 'closed');
          openStatusEl.innerHTML = (isOpen ? '🟢 ' : '🔴 ') + (isOpen ? 'مفتوح الآن' : 'مغلق الآن');
        }
        
        // Show open hours
        const hoursEl = document.getElementById('splashHours');
        if (hoursEl && settings.cafe_open_hours) {
          try {
            const hours = JSON.parse(settings.cafe_open_hours);
            const openStr = hours.open || '08:00';
            const closeStr = hours.close || '23:00';
            // Convert 24h to 12h format for nicer display
            const to12h = (t) => {
              const [h, m] = t.split(':');
              const hour = parseInt(h);
              if (hour === 0) return `12:${m} ص`;
              if (hour === 12) return `12:${m} م`;
              if (hour > 12) return `${hour - 12}:${m} م`;
              return `${hour}:${m} ص`;
            };
            hoursEl.style.display = 'inline-flex';
            hoursEl.textContent = `ساعات العمل: ${to12h(openStr)} - ${to12h(closeStr)}`;
          } catch (e) {
            hoursEl.style.display = 'none';
          }
        }
        let contactHtml = '';
        if (settings.cafe_phone) contactHtml += `<div class="contact-item">📞 <a href="tel:${settings.cafe_phone}">${settings.cafe_phone}</a></div>`;
        if (settings.cafe_address) contactHtml += `<div class="contact-item">📍 ${settings.cafe_address}</div>`;
        document.getElementById('splashContact').innerHTML = contactHtml || '';
      } catch (e) {
        document.getElementById('splashContact').innerHTML = '';
      }
    }

    function showLocation() {
      if (!cafeLocation) {
        showToast('لم يتم تحديد موقع المقهى بعد 📍', 'warning');
        return;
      }
      document.getElementById('locationModal').classList.remove('hidden');
      document.getElementById('splashDistance').textContent = '';
      setTimeout(() => {
        if (splashMap) { splashMap.remove(); splashMap = null; }
        splashMap = L.map('splashMap').setView([cafeLocation.lat, cafeLocation.lng], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap'
        }).addTo(splashMap);
        const logoUrl = splashSettings.cafe_logo || '';
        const cafeIconHtml = logoUrl
          ? `<div style="width:50px;height:50px;border-radius:50%;overflow:hidden;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.3);background:white;"><img src="${logoUrl}" style="width:100%;height:100%;object-fit:cover;"></div>`
          : `<div style="width:50px;height:50px;border-radius:50%;background:#B07D4B;display:flex;align-items:center;justify-content:center;color:white;font-size:22px;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.3);">☕</div>`;
        const cafeIcon = L.divIcon({
          className: 'cafe-logo-marker',
          html: cafeIconHtml,
          iconSize: [50, 50],
          iconAnchor: [25, 25],
          popupAnchor: [0, -25]
        });
        L.marker([cafeLocation.lat, cafeLocation.lng], { icon: cafeIcon }).addTo(splashMap)
          .bindPopup(splashSettings.cafe_name || 'المقهى').openPopup();
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition((pos) => {
            const userLat = pos.coords.latitude;
            const userLng = pos.coords.longitude;
            L.marker([userLat, userLng], { icon: L.divIcon({ className: 'user-marker', html: '<div style="background:#5A8F5A;width:12px;height:12px;border-radius:50%;border:2px solid white;"></div>' }) }).addTo(splashMap);
            const dist = calculateDistance(userLat, userLng, cafeLocation.lat, cafeLocation.lng);
            document.getElementById('splashDistance').textContent = `المسافة: ${dist.toFixed(1)} كم`;
          }, () => {});
        }
      }, 100);
    }

    function getSplashCurrentLocation() {
      if (!splashMap) return;
      if (!navigator.geolocation) {
        showToast('المتصفح لا يدعم تحديد الموقع 📍', 'error');
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;
          splashMap.setView([lat, lng], 16);
          L.marker([lat, lng], { icon: L.divIcon({ className: 'user-marker', html: '<div style="background:#5A8F5A;width:12px;height:12px;border-radius:50%;border:2px solid white;"></div>' }) }).addTo(splashMap)
            .bindPopup('موقعك الحالي').openPopup();
          if (cafeLocation) {
            const dist = calculateDistance(lat, lng, cafeLocation.lat, cafeLocation.lng);
            document.getElementById('splashDistance').textContent = `المسافة: ${dist.toFixed(1)} كم`;
          }
        },
        () => showToast('تعذر الحصول على الموقع 📍', 'error')
      );
    }

    function closeLocation() {
      document.getElementById('locationModal').classList.add('hidden');
      if (splashMap) { splashMap.remove(); splashMap = null; }
    }

    function calculateDistance(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
        Math.sin(dLng/2) * Math.sin(dLng/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    document.addEventListener('click', (e) => {
      if (e.target.id === 'locationModal') closeLocation();
    });

    // Theme
    (function initTheme() {
      const saved = localStorage.getItem('cafeTheme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();

    loadSplashData();
  </script>
</body>
</html>
